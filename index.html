<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Una lettera per te</title>
  <style>
    body {
      background-color: #f4f1ee;
      font-family: Georgia, serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .lettera {
      background: white;
      padding: 40px;
      max-width: 600px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
      border-radius: 10px;
      line-height: 1.6;
    }
    h1 {
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="lettera">
    <h1>Per te</h1>
    <p>
      Ciao,<br><br>
      volevo scriverti qualcosa di semplice ma sincero.<br><br>
      [SCRIVI QUI LA TUA LETTERA]<br><br>
      Con affetto ❤️
    </p>
  </div>
</body>
</html>
